techs:

    # Nuclear
    pp_nuclear_conventional:
        essentials:
            name: 'Nuclear - Conventional Gen III'
            color: '#00bcd4' #
            parent: nuclear_power_plants
            carrier: electricity
        constraints:
            lifetime: 60 # years
            #energy_eff: 0.35 #incl availability factor #0.37
        costs:
            monetary:
                energy_cap: 5404 #TNO estimate 2040 #4370  # Meur/GW
                om_annual: 108 #TNO estimate 2040 #91.77 # Meur/GW/yr
                om_prod: 19e-3 #TNO estimate 2040 #2.5e-3 # Meur/GWh

    ##SMRs
    pp_nuclear_smr:
        essentials:
            name: 'Nuclear - SMR'
            color: '#009688' #
            parent: nuclear_power_plants
            carrier: electricity
        constraints:
            lifetime: 60 # years
           # energy_eff: 0.28
        costs:
            monetary:
                energy_cap: 6301 #TNO SMR estimate 2040 #6460  # Meur/GW
                om_annual: 124 #TNO SMR estimate #129.2  # Meur/GW/yr
                om_prod: 20e-3 #TNO SMR esimtate #2.5e-3 # Meur/GWh 

    pp_SMR_CHP_generic:
        essentials:
            name: 'Scaleable CHP SMR'
            color: '#009688' #
            parent: SMR_power_plants
            carrier_in: solid_fuel
            primary_carrier_in: solid_fuel
            carrier_out: electricity
            primary_carrier_out: electricity
            carrier_out_2: heat
        constraints:
            lifetime: 60 # years
            #energy_cap_per_unit: 0.470 #GWe/unit
            carrier_ratios:
                carrier_in: 
                    solid_fuel: 1
                carrier_out: 
                    electricity: 0.6383
                carrier_out_2:
                    heat: 0.8511
        costs:
            monetary:
                energy_cap: 6301 #TNO SMR estimate 2040 #6460  # Meur/GW
                om_annual: 124 #TNO SMR estimate #129.2  # Meur/GW/yr
                om_prod: 20e-3 #TNO SMR estimate #2.5e-3 # Meur/GWh
                interest_rate: 0.07 #WACC

    # CCGT
    pp_ccgt_gas:
        essentials:
            name: 'CCGT - Gas'
            # color: '#b8bd20' #!
            parent: gas_fired_power_plants
            carrier_in: gas
            carrier_in_2: ets_budget
            primary_carrier_in: gas
            carrier_out: electricity
            carrier_out_2: co2_emitted
            primary_carrier_out: electricity
        constraints:
            lifetime: 30 # years
            #energy_eff: 0.6
            #energy_cap_min_use: 0.25 # force operational lower limit of 40% for CCGTs
            carrier_ratios:
                carrier_in:
                    gas: 1.0
                carrier_in_2:
                    ets_budget: 0.33666
                carrier_out: 
                    electricity: 0.6
                carrier_out_2:
                    co2_emitted: 0.33666 #
        costs:
            monetary:
                energy_cap: 750  # Meur/GW
                om_annual: 11.33  # Meur/GW/yr
                om_prod: 2.5e-3 #Meur/GWh

    pp_ccgt_hyd:
        essentials:
            name: 'CCGT - Hydrogen'
            # color: '#b8bd20' #!
            parent: conversion
            carrier_in: hydrogen
            carrier_out: electricity
        constraints:
            lifetime: 30 # years
            energy_eff: 0.6
        costs:
            monetary:
                energy_cap: 749.4  # Meur/GW
                om_annual: 11.33  # Meur/GW/yr
                om_prod: 2.5e-3 #Meur/GWh
                interest_rate: 0.07 #WACC

    # OCGT
    pp_ocgt_gas:
        essentials:
            name: 'OCGT - Gas'
            # color: '#b8bd20' #!
            parent: gas_fired_power_plants
            carrier_in: gas
            carrier_in_2: ets_budget
            primary_carrier_in: gas
            carrier_out: electricity
            carrier_out_2: co2_emitted
            primary_carrier_out: electricity
        constraints:
            lifetime: 40 # years
            #energy_eff: 0.36
            carrier_ratios:
                carrier_in:
                    gas: 1.0
                carrier_in_2:
                    ets_budget: 0.56111
                carrier_out:
                    electricity: 0.36
                carrier_out_2:
                    co2_emitted: 0.56111 #
        costs:
            monetary:
                energy_cap: 749  # Meur/GW
                om_annual: 7.5  # Meur/GW/yr
                om_prod: 3.76e-3 # Meur/GWh

    pp_ocgt_hyd:
        essentials:
            name: 'OCGT - Hydrogen'
            # color: '#b8bd20' #!
            parent: conversion
            carrier_in: hydrogen
            carrier_out: electricity
        constraints:
            lifetime: 50 # years
            energy_eff: 0.34
        costs:
            monetary:
                interest_rate: 0.07 # WACC
                energy_cap: 535.921  # Meur/GW
                om_annual: 6.181  # Meur/GW/yr. 
                om_prod: 3.76e-3 # Meur/GWh

    # biomass/waste
    pp_biomass_standalone:
        essentials:
            name: 'Biomass - Standalone'
            color: '#795548' #
            parent: conversion
            carrier_in: solid_fuel
            carrier_out: electricity
        constraints:
            lifetime: 40 # years
            energy_eff: 0.64
        costs:
            monetary:
                energy_cap: 1400  # Meur/GW
                om_annual: 20  # Meur/GW/yr
                om_prod: 53.33e-3 # Meur/GWh
                interest_rate: 0.04 #WACC

    pp_waste_incinerator:
        essentials:
            name: 'Waste incinerator'
            color: '#795548' #
            parent: solid_fuel_power_plants
            carrier_in: solid_fuel
            carrier_in_2: ets_budget
            primary_carrier_in: solid_fuel
            carrier_out: electricity
            carrier_out_2: co2_emitted
            primary_carrier_out: electricity
        constraints:
            lifetime: 20 # years
            #energy_eff: 0.25 
            carrier_ratios:
                carrier_in:
                    solid_fuel: 1.0
                carrier_in_2:
                    ets_budget: 1.66
                carrier_out:
                    electricity: 0.25
                carrier_out_2:
                    co2_emitted: 1.66 # 0,415 mg CO2/mg of waste div by 25% efficiency, ref: https://www.ipcc-nggip.iges.or.jp/public/gp/bgp/5_3_Waste_Incineration.pdf
        costs:
            monetary:
                energy_cap: 1400  # Meur/GW
                om_annual: 0 
                om_prod: 1.1699 #Meur/GWh

