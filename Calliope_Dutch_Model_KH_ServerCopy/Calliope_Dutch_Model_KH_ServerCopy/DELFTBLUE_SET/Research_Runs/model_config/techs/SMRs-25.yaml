techs:

    #CHP SMRs
    pp_SMR_RollsRoyce_CHP_1:
        essentials:
            name: 'CHP Rolls-Royce SMR unit 1'
            color: '#009688' #
            parent: SMR_power_plants
            carrier_in: solid_fuel
            primary_carrier_in: solid_fuel
            carrier_out: electricity
            primary_carrier_out: electricity
            carrier_out_2: heat
        constraints:
            lifetime: 60 # years
            energy_cap_per_unit: 0.470 #GWe/unit
            carrier_ratios:
                carrier_in: 
                    solid_fuel: 1
                carrier_out: 
                    electricity: 0.6383
                carrier_out_2:
                    heat: 0.8511
        costs:
            monetary:
                energy_cap: 4725.75 #0.75*6301 #TNO SMR estimate 2040 #6460  # Meur/GW
                om_annual: 124 #TNO SMR estimate #129.2  # Meur/GW/yr
                om_prod: 20e-3 #TNO SMR estimate #2.5e-3 # Meur/GWh
