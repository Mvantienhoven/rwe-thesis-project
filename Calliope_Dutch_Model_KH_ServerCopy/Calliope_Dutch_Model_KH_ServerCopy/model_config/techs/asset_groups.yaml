tech_groups:

    # Demand

    firm_demand:
        essentials:
            parent: demand
        constraints:
            force_resource: True
            resource_unit: energy

    load_shedding:
        essentials:
            parent: supply
        constraints:
            lifetime: 100
            force_resource: False
            resource_unit: energy
        costs:
            monetary:
                interest_rate: 0.1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    terminal_import:
        essentials:
            parent: supply
            # carrier: LNG/NH3
        constraints:
            lifetime: 100
            force_resource: False
        costs:
            monetary:
                interest_rate: 0.03
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    renewables:
        # Wind onshore/offshore
        # Solar utility/rooftop
        essentials:
            parent: supply
        constraints:
            resource_unit: energy_per_cap
        costs:
            monetary:
                interest_rate: 0.04
                energy_cap: 0
                om_prod: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    firm_supply:
        essentials:
            parent: supply
        constraints:
            resource: 4e8
            resource_unit: energy
        costs:
            monetary:
                interest_rate: 0.1
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
    
    nuclear_power_plants:
        # Nuclear Gen3 / SMR
        essentials:
            parent: supply
        costs:
            monetary:
                interest_rate: 0.04
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    SMR_power_plants:
        # CHP/CH2P/CHH2P SMRs
        essentials:
            parent: conversion_plus
        costs:
            monetary:
                interest_rate: 0.07 #7% WACC, for all new techs.
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    solid_fuel_power_plants:
        # Biomass
        essentials:
            parent: conversion_plus
        costs:
            monetary:
                interest_rate: 0.04
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    gas_fired_power_plants:
        # Gas fired CCGT/OCGT
        # Hydrogen fired CCGT/OCGT
        essentials:
            parent: conversion_plus
        costs:
            monetary:
                interest_rate: 0.04
                energy_cap: 0
            co2_emitted:
                interest_rate: 1
                energy_cap: 0
            co2_stored:
                interest_rate: 1
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0


    heater_plants:
        essentials:
            parent: conversion
        costs:
            monetary:
                interest_rate: 0.04
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0


    electrolyser_plants:
        # Alkaline
        # PEM
        # SOE
        essentials:
            parent: conversion
        costs:
            monetary:
                interest_rate: 0.07 #7% WACC
                energy_cap: 0
            spores_score:
                interest_rate: 0.07 #7% WACC
                energy_cap: 0

