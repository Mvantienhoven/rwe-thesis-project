    battery_systems:
        # Li+
        # Redox flow
        essentials:
            parent: storage
        constraints:
            force_asynchronous_prod_con: false # prevent dissipation of energy through nonphysical flows
            #energy_cap_max_systemwide: 100 # GW, arbitrary
            #storage_cap_max_systemwide: 100000.0 # GW, arbitrary
        costs:
            monetary:
                interest_rate: 0.04
                energy_cap: 0
                storage_cap: 1
            spores_score:
                interest_rate: 1
                energy_cap: 0
                storage_cap: 0

    saltcavern_systems:
        # hydrogen storage
        # gas storage
        essentials:
            parent: storage
            # carrier: gas/hydrogen
        constraints:
            force_asynchronous_prod_con: false # prevent dissipation of energy through nonphysical flows
        costs:
            monetary:
                interest_rate: 0.03 # WACC
                energy_cap: 0
                storage_cap: 1
            spores_score:
                interest_rate: 1
                energy_cap: 0
                storage_cap: 0


    # Infra
    power_transmission:
        # HVAC interconnectors
        # HVDC interconnectors
        essentials:
            parent: transmission
        constraints:
            force_asynchronous_prod_con: false # prevent dissipation of energy through nonphysical flows
            energy_eff_per_distance: 0.99965
        costs:
            monetary:
                interest_rate: 0.03 #WACC
                energy_cap: 364 #M€/GW
            line_load:
                interest_rate: 1
                om_prod: 
            spores_score:
                interest_rate: 1
                energy_cap: 0

    interconnector:
        essentials:
            parent: transmission
        constraints:
            lifetime: 30
            force_asynchronous_prod_con: false # prevent dissipation of energy through nonphysical flows
            energy_eff_per_distance: 0.99965
        costs:
            monetary:
                interest_rate: 0.03 #WACC
                energy_cap: 364 #M€/GW
                
    crossborder_import:
        essentials:
            parent: supply
            # carrier: electricity/hydrogen/gas
        constraints:
            lifetime: 100
            # energy_eff: 0.95 # add 5% loss to prevent singularity when import/export have the same price. Can be considered as a trading premium.
            force_resource: false
            # resource: 1000 # GW
            resource_unit: energy
            # energy_cap_max: 100 # GW
        costs:
            monetary:
                interest_rate: 0.03
                energy_cap: 0
                # om_prod: 1e-3
            spores_score:
                interest_rate: 1
                energy_cap: 0
            primary_energy:
                interest_rate: 0
                om_prod: 1

    crossborder_export:
        essentials:
            parent: demand
        constraints:
            force_resource: false
            # resource: -1000 # GW
            resource_unit: energy

    gas_transmission:
        essentials:
            parent: transmission
            # carrier: gas/hydrogen
        constraints:
            force_asynchronous_prod_con: false # prevent dissipation of energy through nonphysical flows
            energy_eff_per_distance: 1
        costs:
            monetary:
                interest_rate: 0.03
                energy_cap: 0
            spores_score:
                interest_rate: 1
                energy_cap: 0

    # Curtailment
    curtailment:
        essentials:
            parent: demand
            # carrier: electricity/gas/hydrogen
        constraints:
            force_resource: False
            resource: -1000 # GW
            resource_unit: energy


