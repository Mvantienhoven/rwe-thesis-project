techs:
    transmission_hvac:
        essentials:
            name: 'Transmission - Electricity HVAC'
            parent: power_transmission
            color: '#795548'
            carrier: electricity
        constraints:
            lifetime: 30
            energy_eff_per_distance: 0.99965 # 0.0035%/km https://iea-etsap.org/E-TechDS/PDF/E12_el-t&d_KV_Apr2014_GSOK.pdf
            force_asynchronous_prod_con: false
        costs:
            monetary:
                energy_cap: 364 # Meur/GW (CE Delft 2017, ook bron van NBNL2025)
    
    free_gas_transmission:
        essentials:
            name: 'Free gas transmission'
            parent: gas_transmission
            carrier: gas
            #color: '#808080'
        constraints:
            energy_eff_per_distance: 1
            force_asynchronous_prod_con: false
            lifetime: 1
            energy_cap_equals: 1000 # GW

