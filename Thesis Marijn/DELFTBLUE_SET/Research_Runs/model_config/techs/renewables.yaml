techs:

    wind_offshore:
        essentials:
            name: 'Wind farm - offshore'
            color: '#4caf50' # green
            parent: renewables
            carrier: electricity
        constraints:
            lifetime: 20 # years
            resource: file=renewables/wind_offshore_6nodes_2040.csv
            #resource_area_per_energy_cap: 167 #km² per GW
            force_resource: False
        costs:
            monetary:
                energy_cap: 2500 #previously: 2985.789 incl. 1159 M€/GW offshore net (aanname T-cap == wind-cap) #1826.789  #Meur/GW
                om_annual: 65.625     # Meur/GW/yr

    wind_onshore:
        essentials:
            name: 'Wind farm - onshore'
            color: '#8bc34a' # dark green
            parent: renewables
            carrier: electricity
        constraints:
            lifetime: 20 # years
            resource: file=renewables/wind_onshore_nodes_2040.csv
            #resource_area_per_energy_cap: 67 #km² per GW
            force_resource: False
        costs:
            monetary:
                energy_cap: 1391.987  # Meur/GW
                om_annual: 17.31 # Meur/GW/yr

    pv_rooftop:
        essentials:
            name: 'Renewables - Rooftop PV'
            color: '#ffeb3b'
            parent: renewables
            carrier: electricity
        constraints:
            lifetime: 25 # years
            resource: file=renewables/pv_nodes_2040.csv
            #resource_area_per_energy_cap: 4 #km² per GW
            force_resource: False
        costs:
            monetary:
                energy_cap: 960.874  # Meur/GW
                om_annual: 12.554  # Meur/GW/yr

    pv_utility:
        essentials:
            name: 'Renewables - Utility PV'
            color: '#cddc39'
            parent: renewables
            carrier: electricity
        constraints:
            lifetime: 25 # years
            resource: file=renewables/pv_nodes_2040.csv
            #resource_area_per_energy_cap: 7 # km² per GW
            force_resource: False
        costs:
            monetary:
                energy_cap: 643.782  # Meur/GW
                om_annual: 11.752  # Meur/GW/yr


    hydro_RoR: #Do I need to do something with resource??
        essentials:
            name: 'Hydro - Run of River'
            color: '#2196f3' # blue
            parent: renewables
            carrier: electricity
        constraints:
            lifetime: 45 # years
            #energy_eff: 0.98
        costs:
            monetary:
                energy_cap: 3600  #Meur/GW
                om_annual: 32 # Meur/GW/yr
                interest_rate: 0.07 #WACC

