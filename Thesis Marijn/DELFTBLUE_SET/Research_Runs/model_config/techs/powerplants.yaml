    # STEP 3d (power-only + hard-CO2-cap): Option A with dummy fuel input
    # No gas/solid_fuel market network; carrier_ratios kept via conversion_plus parents.
    # Hydrogen and broader fuel/storage stacks remain disabled.
    # CCGT
    pp_ccgt_gas:
        essentials:
            name: 'CCGT - Gas'
            # color: '#b8bd20' #!
            parent: gas_fired_power_plants
            carrier_in: fuel_dummy
            primary_carrier_in: fuel_dummy
            carrier_out: electricity
            carrier_out_2: co2_emitted
            primary_carrier_out: electricity
        constraints:
            lifetime: 30 # years
            carrier_ratios:
                carrier_in:
                    fuel_dummy: 1.0
                carrier_out:
                    electricity: 1.0
                carrier_out_2:
                    co2_emitted: 0.5611 # kton/GWh_e
        costs:
            monetary:
                energy_cap: 750  # Meur/GW
                om_annual: 11.33  # Meur/GW/yr
                om_prod: 130.148e-3 # Meur/GWh_e (all-in fuel+ETS+VOM)
                # fuel: 17 €/MWh_fuel / 0.60 = 28.33 €/MWh_e
                # CO2: (0.33666 kton/GWh_fuel)*(1/0.60)=0.5611 t/MWh_e; *177 €/t = 99.32 €/MWh_e
                # VOM: 2.50 €/MWh_e  (your old om_prod)
                # total = 130.15 €/MWh_e  => 130.15e-3 MEUR/GWh_e
