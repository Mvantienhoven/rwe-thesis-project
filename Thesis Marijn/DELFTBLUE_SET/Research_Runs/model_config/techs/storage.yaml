techs:

    ES_BESS_IDES:
        essentials:
            name: 'Battery storage - Lithium'
            parent: battery_systems
            carrier: electricity
        constraints:
            lifetime: 15  # years
            energy_eff: 0.92195  # SQRT(0.85)=0.92195=> 0.85 = round-trip eff
            energy_cap_per_storage_cap_max: 1  # <0.5 typically grid services, >0.5 typically arbitrage/RES integration
            energy_cap_per_storage_cap_min: 0.1  #
            force_asynchronous_prod_con: false  
            storage_initial: 1 
        costs:
            monetary:
                energy_cap: 300 #2400  # Meur/GW
                storage_cap: 200 #400  # Meur/GWh
                om_annual: 5 #6.45  Meur/GW/yr (based on input/flow MW not storage MWh)
                interest_rate: 0.04 #WACC


    ES_BESS_offshore:
        essentials:
            name: 'Battery storage - Lithium'
            parent: battery_systems
            carrier: electricity
        constraints:
            lifetime: 15  # years
            energy_eff: 0.92195  # SQRT(0.85)=0.92195=> 0.85 = round-trip eff
            energy_cap_per_storage_cap_max: 1  # <0.5 typically grid services, >0.5 typically arbitrage/RES integration
            energy_cap_per_storage_cap_min: 0.1  #
            force_asynchronous_prod_con: false  
            storage_initial: 1 
        costs:
            monetary:
                energy_cap: 450 #2400  # Meur/GW
                storage_cap: 300 #400  # Meur/GWh
                om_annual: 7.5 #6.45  Meur/GW/yr (based on input/flow MW not storage MWh)
                interest_rate: 0.04 #WACC

