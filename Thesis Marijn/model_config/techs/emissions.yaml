#-------------------------------------------------COMMENTS KEVIN------------------------------------------------------#
# For tracking/constraining/pricing emissions and storage.

#----------------------------------------------------------------------------------------------------------------------#

techs:
    ets_budget_cap:
        essentials:
            name: 'CO2: ETS allowed'
            parent: supply
            carrier: ets_budget
        constraints:
            resource: inf #9999 #kton CO2/yr
            force_resource: false
        costs:
            monetary:
                om_prod: 177e-3 #ets price M€/ktonCO2
    
    co2_emissions_sink:
        essentials:
            name: 'CO2 sink'
            parent: demand
            carrier: co2_emitted
        constraints:
            resource: inf
            force_resource: false

    ets_exceedance:
        essentials:
            name: 'CO2: ETS exceedance'
            parent: supply
            carrier: ets_penalty
        constraints:
            resource: inf
            force_resource: false
        costs:
            monetary:
                om_prod: 277e-3 #M€/ktonCO2 | penalty of €100 + ets price of €177

    co2_storage:
        essentials:
            name: 'CO2 stored sink'
            parent: demand
            carrier: co2_stored
        constraints:
            resource: inf
            force_resource: False
        costs:
            monetary:
                om_con: -177e-3 #Meur/kton CO2 stored (negative, so subsidy)
