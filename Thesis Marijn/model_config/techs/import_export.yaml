#-------------------------------------------------COMMENTS KEVIN------------------------------------------------------#
# import and export tech classes.

#----------------------------------------------------------------------------------------------------------------------#

techs:
    export_demand:
        essentials:
            name: 'Export - Demand'
            #color: '#ffc107'
            parent: demand
            carrier: sink
        constraints:
            force_resource: False
            resource: -1000 #arbitrary, not enforced and capped out by interconnectors

    # Crossborder
    import_DIE:
        essentials:
            name: 'Import - DIE'
        #    color: '#ffc107'
            parent: supply
            carrier: electricity
        constraints:
            force_resource: False
            energy_cap_equals: 1.200 #same as flow_cap_max of interconnector
        costs:
            monetary:
                om_con: file=import_export/import_price_2040.csv:DE
    export_DIE:
        essentials:
            name: 'Export - DIE'
        #    color: '#ffc107'
            parent: conversion
            carrier_in: electricity
            carrier_out: sink
        constraints:
            energy_cap_equals: 1.200 #same as flow_cap_max of interconnector
            energy_eff: 1
        costs:
            monetary:
                om_con: file=import_export/export_price_2040.csv:DE

