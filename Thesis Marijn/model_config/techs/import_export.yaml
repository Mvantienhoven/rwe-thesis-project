    import_hyd_interconnector:
        essentials:
            name: 'Import - Hydrogen interconnection'
            parent: crossborder_import
            carrier: hydrogen
        costs:
            monetary:
                om_prod: 75e-3 #! MEUR/GWh, assumed hydrogen import price  
                         
    import_gas_interconnector:
