            parent: crossborder_import
            carrier: gas
        costs:
            monetary:
                om_prod: 36e-3 #! MEUR/GWh

    import_ammonia_cracker:
        essentials:
            name: 'Import - Ammonia cracker'
            parent: terminal_import
            carrier: hydrogen
        costs:
            monetary:
                energy_cap: 946 #! MEUR/GW, calculated from: https://iopscience.iop.org/article/10.1088/1755-1315/983/1/012051/pdf
                om_annual_investment_fraction: 0.03  # *100% of CAPEX/yr, TNO estimate
