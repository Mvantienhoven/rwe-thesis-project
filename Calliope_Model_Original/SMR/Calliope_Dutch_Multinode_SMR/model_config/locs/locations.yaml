#-------------------------------------------------COMMENTS KEVIN------------------------------------------------------#
# Includes all locations in the Netherlands, Germany, Belgium, UK, Norway and Denmark
# Energy cap equals on: gas field production, salt cavern gas storage, LNG terminal
# techs that are commented out are not used in the model, can be overriden

### INTERCONNECTORS have FIXED actual available flow for all timesteps (resource equals), model wil NOT expand capacity
### TRANSMISSION do NOT have fixed capacity, but have defined OM_prod per Net Transfer Capacity (NTC)

