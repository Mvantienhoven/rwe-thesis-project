scenarios:

    spores_base_settings: [activate_spores, slack_25]

    # Normal
    ## All
    spores_settings: [spores_base_settings, all_mode, spores_50, method_random]
    spores_all_no100: [spores_base_settings, all_mode, spores_100, method_random]
    spores_all_no200: [spores_base_settings, all_mode, spores_200, method_random]
    spores_all_no400: [spores_base_settings, all_mode, spores_400, method_random]

    spores_all_sl10: [activate_spores, slack_10, all_mode, spores_100, method_random]
    spores_all_sl05: [activate_spores, slack_05, all_mode, spores_100, method_random]

    spores_int: [spores_base_settings, all_mode, spores_100, method_integer]
    spores_rel: [spores_base_settings, all_mode, spores_100, method_relative]
    spores_ran: [spores_base_settings, all_mode, spores_100, method_random]
    spores_evo: [spores_base_settings, all_mode, spores_100, method_evolving]

    spores_min_wind: [spores_base_settings, min_mode, excl_wind_onshore, excl_wind_offshore]
    spores_max_wind: [spores_base_settings, max_mode, excl_wind_onshore, excl_wind_offshore]

