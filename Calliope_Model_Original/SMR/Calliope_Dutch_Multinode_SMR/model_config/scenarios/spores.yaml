overrides:
    activate_spores:

        group_constraints:
            systemwide_cost_max:
                cost_max.monetary: 1e9
                # cost_max: {monetary: 1e9, co2_emitted: 1e9}

        run.mode: spores
        run.spores_options:
            score_cost_class: 'spores_score'
            slack_cost_group: 'systemwide_cost_max'  # The group constraint name in which the `cost_max` constraint is assigned, for use alongside the slack and cost-optimal cost
            
            # scoring_method: integer
            
            save_per_spore: false
            save_per_spore_path: "output/_temp/spore_run_{}.nc"

        # run.solver_options.BarConvTol: 1e-4
        # run.objective_options.cost_class: {'monetary': 1, 'spores_score': 0} #, excl_score: 0
        # run.objective_options: {'cost_class': {'monetary': 1}, 'sense': 'minimize'}  # Arguments to pass to objective function. If cost-based objective function in use, should include 'cost_class' and 'sense' (maximize/minimize)


    all_mode:
        # run.spores_options.score_cost_class: 'spores_score'  # The cost class to optimise against when generating SPORES
        run.spores_options.objective_cost_class: {'spores_score': 1, 'monetary': 0} #excl_score: 0,
        # run.spores_options: 
            # Select spores_0x case below.

    max_mode:    
        # run.spores_options.score_cost_class: 'excl_score'  # The cost class to optimise against when generating SPORES
        # run.spores_options.objective_cost_class: {spores_score: 0.01, monetary: 0, excl_score: -100000}
        run.spores_options.objective_cost_class: {'spores_score': 0.01, 'monetary': 0, 'excl_score': -100}
        run.spores_options.spores_number: 10  # The number of SPORES to generate

    min_mode: 
        # run.spores_options.score_cost_class: 'excl_score'  # The cost class to optimise against when generating SPORES
        # run.spores_options.objective_cost_class: {'spores_score': 0.01, 'monetary': 0, 'excl_score': 0}
        # run.spores_options.objective_cost_class: {spores_score: 0.01, monetary: 0, excl_score: 100000}
        run.spores_options.objective_cost_class: {'spores_score': 0.01, 'monetary': 0, 'excl_score': 100}
        run.spores_options.spores_number: 10  # The number of SPORES to generate

    # Vary cost slack.
    slack_03:
        run.spores_options:
            slack: 0.03  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    slack_05:
        run.spores_options:
            slack: 0.05  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    slack_10:
        run.spores_options:
            slack: 0.10  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    slack_15:
        run.spores_options:
            slack: 0.15  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    slack_25:
        run.spores_options:
            slack: 0.25  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    slack_30:
        run.spores_options:
            slack: 0.30  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    slack_50:
        run.spores_options:
            slack: 0.50  # The fraction above the cost-optimal cost to set the maximum cost during SPORES

    # Vary no. spores to find.
    spores_02:
        run.spores_options:
            spores_number: 2  # The number of SPORES to generate

    spores_05:
        run.spores_options:
            spores_number: 5  # The number of SPORES to generate

    spores_10:
        run.spores_options:
            spores_number: 10  # The number of SPORES to generate

    spores_25:
        run.spores_options:
            spores_number: 25  # The number of SPORES to generate

    spores_50:
        run.spores_options:
            spores_number: 50  # The number of SPORES to generate

    spores_99:
        run.spores_options:
            spores_number: 99  # The number of SPORES to generate


    method_integer:
        run.spores_options:
            scoring_method: 'integer'
    
    method_relative:
        run.spores_options:
            scoring_method: 'relative_deployment'
    
    method_random:
        run.spores_options:
            scoring_method: 'random'
    
    method_evolving:
        run.spores_options:
            scoring_method: 'evolving'

    # Focus on particular technologies.

    # excl_wind_onshore:
    #     techs.wind_onshore.costs.spores_score.energy_cap: -100
    #     techs.wind_onshore.costs.spores_score.interest_rate: 1

    # excl_wind_offshore:
    #     techs.wind_offshore.costs.spores_score.energy_cap: -100
    #     techs.wind_offshore.costs.spores_score.interest_rate: 1

    excl_wind_onshore:
        techs.wind_onshore.costs.excl_score.energy_cap: 1
        techs.wind_onshore.costs.excl_score.interest_rate: 1

    excl_wind_offshore:
