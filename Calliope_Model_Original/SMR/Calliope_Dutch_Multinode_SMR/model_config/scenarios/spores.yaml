        techs.electrolyser_soe.costs.excl_score.interest_rate: 1

    excl_bss_liion:
        techs.bss_liion.costs.excl_score.energy_cap: 1
        techs.bss_liion.costs.excl_score.interest_rate: 1
        
    excl_bss_vanadium:
