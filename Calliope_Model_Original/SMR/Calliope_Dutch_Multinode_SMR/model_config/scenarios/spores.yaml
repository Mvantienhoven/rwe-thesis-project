    spores_max_electrolyser: [spores_base_settings, max_mode, excl_electrolyser_alk, excl_electrolyser_pem, excl_electrolyser_soe]

    spores_min_battery: [spores_base_settings, min_mode, excl_bss_liion, excl_bss_vanadium, excl_bss_nas]
    spores_max_battery: [spores_base_settings, max_mode, excl_bss_liion, excl_bss_vanadium, excl_bss_nas]

    spores_min_reformer: [spores_base_settings, min_mode, excl_reformer_smr, excl_reformer_smr_ccs, excl_reformer_atr_ccs]
    spores_max_reformer: [spores_base_settings, max_mode, excl_reformer_smr, excl_reformer_smr_ccs, excl_reformer_atr_ccs]

    spores_min_interconnector: [spores_base_settings, min_mode, excl_transmission_hvac,excl_transmission_hvdc]
    spores_max_interconnector: [spores_base_settings, max_mode, excl_transmission_hvac,excl_transmission_hvdc]

    spores_min_terminal: [spores_base_settings, min_mode, excl_import_ammonia_cracker,excl_import_lng_terminal]
    spores_max_terminal: [spores_base_settings, max_mode, excl_import_ammonia_cracker,excl_import_lng_terminal]












    # Min/max
