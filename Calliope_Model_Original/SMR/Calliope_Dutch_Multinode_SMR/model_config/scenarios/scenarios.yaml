    spores_eur_2050: [spores_settings, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_max_wind_onshore: [spores_max_wind_onshore, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_min_wind_onshore: [spores_min_wind_onshore, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_max_wind: [spores_max_wind, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_min_wind: [spores_min_wind, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_max_nuclear: [spores_max_nuclear, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_min_nuclear: [spores_min_nuclear, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_max_pv: [spores_max_pv, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]
    spores_eur_2050_min_pv: [spores_min_pv, demand_ii3050_eur_2050, energy_price_settings, emission_settings, biomass_settings]

    spores_nat_2050: [spores_settings, demand_ii3050_nat_2050, energy_price_settings, emission_settings]
    spores_nat_2050_max_wind_onshore: [spores_max_wind_onshore, demand_ii3050_nat_2050, energy_price_settings, emission_settings]
    spores_nat_2050_min_wind_onshore: [spores_min_wind_onshore, demand_ii3050_nat_2050, energy_price_settings, emission_settings]
    spores_nat_2050_max_wind: [spores_max_wind, demand_ii3050_nat_2050, energy_price_settings, emission_settings]
