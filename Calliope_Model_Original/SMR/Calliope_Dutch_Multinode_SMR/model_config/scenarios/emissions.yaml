##-----------------------------------------------Comments Kevin-----------------------------------------##
# Various emission cap scenarios:
    # ets_cap00: ETS cap of 0 kton CO2/a, no emissions allowed
    # ets_cap07: ETS cap of 7.5 kton CO2/a,
    # ets_cap10: ETS cap of 10 kton CO2/a,
    # ets_cap15: ETS cap of 15 kton CO2/a,
    # ets_cap30: ETS cap of 30 kton CO2/a,
    # ets_cap50: ETS cap of 50 kton CO2/a,
    # ets_cap100: ETS cap of 100 kton CO2/a,
    # ets_cap55: ETS cap of 12 kton CO2/a, used in the 2024 IP
# Various CO2 price scenarios:
#     ets_0: ETS price of 0 EUR/kton CO2, no costs for CO2 emissions
#     ets_100: ETS price of 100 EUR/kton CO2,
#     ets_150: ETS price of 150 EUR/kton CO2,
#     ets_300: ETS price of 300 EUR/kton CO2,
#     ets_500: ETS price of 500 EUR/kton CO2,
#     ets_1000: ETS price of 1000 EUR/kton CO2,
# Various CO2 penalty scenarios:
#     penalty_0: CO2 penalty of 0 EUR/kton CO2, no costs for CO2 emissions
#     penalty_200: CO2 penalty of 200 EUR/kton CO2,
#     penalty_300: CO2 penalty of 300 EUR/kton CO2,
#     penalty_350: CO2 penalty of 350 EUR/kton CO2,
#     penalty_500: CO2 penalty of 500 EUR/kton CO2,
#     penalty_700: CO2 penalty of 700 EUR/kton CO2,
#     penalty_1200: CO2 penalty of 1200 EUR/kton CO2
# Various CCS cap scenarios:
#     ccs_cap00: CCS cap of 0 kton CO2/a, no
#     ccs_cap05: CCS cap of 5 kton CO2/a,
#     ccs_cap10: CCS cap of 10 kton CO2/a,
#     ccs_cap20: CCS cap of 20 kton CO2/a,
#     ccs_cap50: CCS cap of 50 kton CO2/a,
# Various CCS cost scenarios:
#     ccs_0: CCS cost of 0 EUR/kton CO2, no
#     ccs_10: CCS cost of 10 EUR/kton CO2,
#     ccs_15: CCS cost of 15 EUR/kton CO2,
#     ccs_30: CCS cost of 30 EUR/kton CO2,
#     ccs_50: CCS cost of 50 EUR/kton CO2,
#     ccs_100: CCS cost of 100 EUR/kton CO2

# SET CORRECT OVERRIDES FOR SCENARIO

# To do: Check logic of how these emissions scenarios are set up and used in the model.
##------------------------------------------------------------------------------------------------------##

overrides:

    emission_cap:
        group_constraints:
            co2_emissions_cap:
                techs: [co2_atmosphere, co2_ets]
                carrier_con_max.co2_emitted: -17820
    # _xx refers to approx % remaining emissions w.r.t. a baseline, assumed to be 150 Mton/a.
    # Unit = kton CO2/a

    ets_cap00:
        group_constraints.ets_cap.techs: ['co2_ets']
        group_constraints.ets_cap.carrier_con_max.co2_emitted: 0.0 # kton CO2/a
        group_constraints.ets_penalty.carrier_con_max.co2_emitted: 0


    ets_cap07:
        group_constraints.ets_cap.techs: ['co2_ets']
        group_constraints.ets_cap.carrier_con_max.co2_emitted: -7.5e3 # kton CO2/a

    ets_cap10:
        group_constraints.ets_cap.techs: ['co2_ets']
        group_constraints.ets_cap.carrier_con_max.co2_emitted: -10e3 # kton CO2/a

    ets_cap15:
        group_constraints.ets_cap.techs: ['co2_ets']
        group_constraints.ets_cap.carrier_con_max.co2_emitted: -15e3 # kton CO2/a


