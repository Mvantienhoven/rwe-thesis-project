    ets_cap100:
        group_constraints.ets_cap.techs: ['co2_ets']
        group_constraints.ets_cap.carrier_con_max.co2_emitted: -100e3 # kton CO2/a

    ets_cap55:
        group_constraints.ets_cap.techs: ['co2_ets']
        group_constraints.ets_cap.carrier_con_max.co2_emitted: -12e3 # kton CO2/a 
    # _xx refers to CO2 price in EUR/kton CO2.
    # Unit = MEUR/GWh, 1e-3 equals 1 EUR/kton CO2

