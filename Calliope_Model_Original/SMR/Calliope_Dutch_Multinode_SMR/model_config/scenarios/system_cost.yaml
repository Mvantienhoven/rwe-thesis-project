##-----------------------------------------------Comments Kevin-----------------------------------------##
# Sets manual TSC constraints, possibly to be used with spores after running in Plan mode?

##------------------------------------------------------------------------------------------------------##

# here you can set a system wide constraint on monetary costs to explore the near cost optimal decision space while optimizing for lineload or CO2. Change the value to for example 101, 105 or 110% of the costs in the cost optimal solution.

overrides:
    # within 101% max 
    central_nd_101:
        group_constraints:
            central_nd_101:
                cost_max:
                    monetary: 4.316e+04 # +1%

