    demand_elc:
        essentials:
            name: 'Firm demand - Electricity'
            color: '#ffc107'
            parent: demand
            carrier: electricity
        constraints:
            force_resource: True
            resource: file=demand/2050_Regional_2040_nl/demand_elc.csv #CHANGE FILES HERE

    demand_gas:
        essentials:
            name: 'Firm demand - Gas'
            color: '#607d8b'
            parent: demand
            carrier: gas
        constraints:
            force_resource: True
            resource: file=demand/2050_Regional_2040_nl/demand_gas.csv #CHANGE FILES HERE

    demand_hyd:
        essentials:
            name: 'Firm demand - Hydrogen'
            color: '#3f51b5 '
            parent: demand
            carrier: hydrogen
        constraints:
