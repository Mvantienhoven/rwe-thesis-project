model:
    name: Calliope_Dutch_Multinode_SMR
 
    calliope_version: 0.6.10

    # Time series data path - can either be a path relative to this file, or an absolute path
    timeseries_data_path: 'timeseries_data'

    subset_time: ['2050-01-01 00:00:00', '2050-01-01 01:00:00']  # Subset of timesteps

    time:
        function: resample
        function_options: {'resolution': '1H'}

            
run:
    mode: plan  # Choices: plan, operate, spores

    # operation:
    #     horizon: 8760  # hours
    #     window: 24  # hours

    solver: gurobi
    solver_options:
        # Threads: 20
        # Method: 3
        LogFile: calliope_run_gurobi.log
        # InfUnbdInfo: 1
        # DualReductions: 0
        # ResultFile: model.mps`
        Threads: 12 
        Method: 2 # use barrier, but do not run simplex in parallel 
        Crossover: -0 # stop after barrier, do not perform crossover 
        FeasibilityTol: 1e-3 
        OptimalityTol: 1e-4 
        BarConvTol: 1e-4
        #Presolve: 1  # (Default: -1, 1 = conservative, 2 = aggressive)
        #PreSparsify: 1  # Reduces nonzeros in the constraint matrix

    ensure_feasibility: true # Switching on unmet demand

    # bigM: 15e0 # MEUR/GWh, equals 15,000 EUR/MWh, ref:
    objective_options: {
        'cost_class': {'monetary': 1, 'spores_score': 0, 'excl_score': 0},
        'sense': 'minimize'
    }
    # objective_options:
    #     # Relative cost of different cost classes.
    #     # Note if there are no costs for deployment of technologies, even if it is a single tech, the model will be unbounded.
    #     # Add dummy values to assign some 
    #     # Units
    #     #  1.0 monetary = 1.0 MEUR
    #     #  1.0 dummy = 1.0 MEUR
    #     #  1.0 primary_energy = 1.0 GWh
    #     #  1.0 co2 = 1.0 ton CO2

    #     cost_class: {
    #         monetary: 1, 
    #         # co2_emitted: 100e-6, # MEUR/ton CO2
    #         # co2_stored: 50e-6, # MEUR/ton CO2
    #         primary_energy: 0,
    #         } # add a dummy cost component for non-cost investments to improve numerical performance. Can be easily separated from real MOnetary cost during postprocessing.

    # cyclic_storage: True

